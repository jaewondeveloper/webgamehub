<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGameHub — CorerepubliX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            padding: 24px 16px 48px;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 48px 24px 40px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        .logo {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #00f5ff, #a855f7, #ff6bcb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            margin-top: 10px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.65);
        }

        .creator {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            border-radius: 999px;
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.4);
            font-size: 0.9rem;
            color: #e9d5ff;
        }

        .creator strong {
            color: #fff;
            font-weight: 700;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            padding-left: 8px;
        }

        .games {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .game-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
        }

        .game-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .game-thumb {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .game-thumb.racing {
            background: linear-gradient(135deg, #0a0a18 0%, #003366 50%, #00ffff33 100%);
        }

        .game-thumb.geometry {
            background: linear-gradient(135deg, #000 0%, #0066ff 60%, #00ccff44 100%);
        }

        .game-info {
            padding: 20px 24px 24px;
        }

        .game-info h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .game-info p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
        }

        .play-btn {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 22px;
            border-radius: 999px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        footer {
            text-align: center;
            margin-top: 48px;
            padding: 24px;
            border-radius: 24px;
            background: rgba(0, 0, 0, 0.2);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
        }

        footer a {
            color: #a855f7;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">WebGameHub</div>
            <p class="tagline">브라우저에서 바로 즐기는 무료 웹 게임 모음</p>
            <div class="creator">Made by <strong>CorerepubliX</strong></div>
        </header>

        <h2>Games</h2>
        <div class="games">
            <a class="game-card" href="games/racing.html">
                <div class="game-thumb racing">🏎️</div>
                <div class="game-info">
                    <h3>3D Infinite Racing</h3>
                    <p>사이버펑크 도로를 질주하며 장애물을 피하세요. ← → 키 또는 화면 터치로 조작!</p>
                    <span class="play-btn">PLAY NOW</span>
                </div>
            </a>

            <a class="game-card" href="games/geometry-dash-lite/">
                <div class="game-thumb geometry">🎮</div>
                <div class="game-info">
                    <h3>Geometry Dash Lite</h3>
                    <p>리듬에 맞춰 장애물을 뛰어넘는 플랫포머. 스페이스 또는 클릭으로 점프!</p>
                    <span class="play-btn">PLAY NOW</span>
                </div>
            </a>
        </div>

        <footer>
            <p>&copy; 2026 <strong>CorerepubliX</strong> &middot; <a href="https://github.com/jaewondeveloper/webgamehub">GitHub</a></p>
        </footer>
    </div>
</body>
</html>
