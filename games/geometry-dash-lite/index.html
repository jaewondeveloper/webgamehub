<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Geometry Dash Lite — WebGameHub</title>
    <style>
        html { box-sizing: border-box; }
        *, *:before, *:after { box-sizing: inherit; }
        body {
            margin: 0;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            overflow: hidden;
        }
        #back-hub {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 99999;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            text-decoration: none;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(8px);
        }
        #back-hub:hover { background: rgba(255, 255, 255, 0.15); }
        #gameContainer { width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; display: block; }
        canvas + * { z-index: 2; }
        .logo {
            position: absolute;
            display: block;
            max-width: 100vw;
            max-height: 70vh;
            top: 300px;
        }
        .pos_progress { position: absolute; bottom: 15%; width: 100%; }
        .progress {
            margin: 1.5em auto;
            max-width: 436px;
            height: auto;
            display: none;
            position: relative;
        }
        .full { width: 97%; transform-origin: top left; }
        .box_process { width: 100%; }
        .progress .posfull, .progress .posbox {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progress .posfull { top: 8px; z-index: 1; }
        .progress .posbox { top: 0; z-index: 2; }
        #loader {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            z-index: 50;
        }
        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            cursor: pointer;
        }
        #start-screen img {
            max-width: min(90vw, 500px);
            margin-bottom: 32px;
        }
        #start-screen .play-btn {
            padding: 16px 48px;
            font-size: 22px;
            font-weight: 700;
            border: none;
            border-radius: 999px;
            background: linear-gradient(90deg, #00ccff, #0066ff);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.5);
        }
        #start-screen p {
            margin-top: 16px;
            opacity: 0.7;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <a id="back-hub" href="../../index.html">&larr; Hub</a>

    <div id="start-screen">
        <img src="image/loading.png" alt="Geometry Dash Lite">
        <button class="play-btn" type="button">▶ PLAY</button>
        <p>클릭하면 게임과 음악이 시작됩니다</p>
    </div>

    <div id="gameContainer"></div>
    <div id="loader">
        <img class="logo" src="image/loading.png?v=1" alt="Loading">
        <div class="pos_progress">
            <div class="progress">
                <div class="posfull"><img class="full" src="image/process_bar_back.png" alt=""></div>
                <div class="posbox"><img class="box_process" src="image/process_bar_front.png" alt=""></div>
            </div>
        </div>
    </div>

    <script>
        var gameInstance = null;
        var gameStarted = false;
        var sharedAudioCtx = null;

        function unlockBrowserAudio() {
            var AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return;
            if (!sharedAudioCtx) {
                sharedAudioCtx = new AC();
            }
            if (sharedAudioCtx.state === "suspended") {
                sharedAudioCtx.resume();
            }
            var buf = sharedAudioCtx.createBuffer(1, 1, 22050);
            var src = sharedAudioCtx.createBufferSource();
            src.buffer = buf;
            src.connect(sharedAudioCtx.destination);
            src.start(0);
        }

        function resumeUnityAudio() {
            if (typeof WEBAudio !== "undefined" && WEBAudio.audioContext) {
                WEBAudio.audioWebEnabled = 1;
                if (WEBAudio.audioContext.state === "suspended") {
                    WEBAudio.audioContext.resume();
                }
            }
        }

        function clickOkButtons() {
            var buttons = document.getElementsByTagName("button");
            for (var i = 0; i < buttons.length; i++) {
                if (buttons[i].innerHTML === "OK") {
                    buttons[i].click();
                }
            }
        }

        function UnityProgress(inst, progress) {
            if (!inst.Module) return;
            var loader = document.getElementById("loader");
            if (!inst.progress) {
                var progressEl = document.querySelector("#loader .progress");
                progressEl.style.display = "block";
                inst.progress = progressEl.querySelector(".full");
            }
            inst.progress.style.transform = "scaleX(" + progress + ")";
            if (progress === 1 && !inst.removeTimeout) {
                inst.removeTimeout = setTimeout(function() {
                    loader.style.display = "none";
                    resumeUnityAudio();
                    clickOkButtons();
                    var canvas = document.querySelector("#gameContainer canvas");
                    if (canvas) canvas.focus();
                }, 2000);
            }
        }

        function startGame() {
            if (gameStarted) return;
            gameStarted = true;

            unlockBrowserAudio();
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("loader").style.display = "flex";

            var script = document.createElement("script");
            script.src = "Build/UnityLoader.js";
            script.onload = function() {
                gameInstance = UnityLoader.instantiate("gameContainer", "Build/GeometryDashLite.json", {
                    onProgress: UnityProgress,
                    Module: {
                        postRun: [function() {
                            resumeUnityAudio();
                            clickOkButtons();
                            setTimeout(clickOkButtons, 800);
                        }]
                    }
                });
            };
            document.body.appendChild(script);
        }

        document.getElementById("start-screen").addEventListener("click", startGame);
        document.getElementById("start-screen").addEventListener("touchstart", function(e) {
            e.preventDefault();
            startGame();
        }, { passive: false });

        document.addEventListener("pointerdown", resumeUnityAudio);
        document.addEventListener("keydown", function(e) {
            if (!gameStarted && (e.code === "Space" || e.code === "Enter")) {
                e.preventDefault();
                startGame();
            } else {
                resumeUnityAudio();
            }
        });
    </script>
</body>
</html>
