<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Geometry Dash Lite — WebGameHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #back-hub {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 99999;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            text-decoration: none;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(8px);
        }
        #back-hub:hover { background: rgba(255, 255, 255, 0.2); }
        #game-frame {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <a id="back-hub" href="../../index.html">&larr; Hub</a>
    <iframe
        id="game-frame"
        src="https://geometrylitepc.io/game/geometry-dash-lite/"
        title="Geometry Dash Lite"
        allow="autoplay; fullscreen; gamepad"
        allowfullscreen>
    </iframe>
</body>
</html>
