<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Geometry Dash Lite — WebGameHub</title>
    <style>
        html { box-sizing: border-box; }
        *, *:before, *:after { box-sizing: inherit; }
        body {
            margin: 0;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            overflow: hidden;
        }
        #back-hub {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 99999;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            text-decoration: none;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(8px);
        }
        #back-hub:hover { background: rgba(255, 255, 255, 0.15); }
        #gameContainer { width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; display: block; }
        canvas + * { z-index: 2; }
        .logo {
            position: absolute;
            display: block;
            max-width: 100vw;
            max-height: 70vh;
            top: 300px;
        }
        .pos_progress { position: absolute; bottom: 15%; width: 100%; }
        .progress {
            margin: 1.5em auto;
            max-width: 436px;
            height: auto;
            display: none;
            position: relative;
        }
        .full { width: 97%; transform-origin: top left; }
        .box_process { width: 100%; }
        .progress .posfull, .progress .posbox {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progress .posfull { top: 8px; z-index: 1; }
        .progress .posbox { top: 0; z-index: 2; }
        #loader {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            z-index: 50;
        }
        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 100000;
            background: rgba(0, 20, 60, 0.95);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            padding: 24px;
        }
        #start-screen h2 {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.6);
        }
        #start-screen .subtitle {
            opacity: 0.8;
            font-size: 1rem;
            margin-bottom: 28px;
        }
        #start-screen .play-icon {
            width: 88px;
            height: 88px;
            margin-bottom: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ccff, #0066ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.6);
            animation: pulse 1.5s ease-in-out infinite;
        }
        #start-screen .hint {
            opacity: 0.55;
            font-size: 0.85rem;
            margin-top: 20px;
            max-width: 320px;
            line-height: 1.5;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <a id="back-hub" href="../../index.html">&larr; Hub</a>

    <div id="start-screen">
        <div class="play-icon">&#9654;</div>
        <h2>Geometry Dash Lite</h2>
        <p class="subtitle">클릭하여 시작</p>
        <p class="hint">음악과 효과음이 정상 재생되려면<br>반드시 이 화면을 클릭해 주세요</p>
    </div>

    <div id="gameContainer"></div>
    <div id="loader">
        <img class="logo" src="image/loading.png" alt="Loading">
        <div class="pos_progress">
            <div class="progress">
                <div class="posfull"><img class="full" src="image/process_bar_back.png" alt=""></div>
                <div class="posbox"><img class="box_process" src="image/process_bar_front.png" alt=""></div>
            </div>
        </div>
    </div>

    <script src="Build/UnityLoader.js"></script>
    <script>
        var gameInstance = null;
        var gameStarted = false;
        var audioKeepAlive = null;

        function resumeUnityAudio() {
            if (typeof WEBAudio !== "undefined" && WEBAudio.audioContext) {
                WEBAudio.audioWebEnabled = 1;
                if (WEBAudio.audioContext.state === "suspended") {
                    WEBAudio.audioContext.resume();
                }
            }
            if (gameInstance && gameInstance.Module && gameInstance.Module.WEBAudio) {
                var wa = gameInstance.Module.WEBAudio;
                wa.audioWebEnabled = 1;
                if (wa.audioContext && wa.audioContext.state === "suspended") {
                    wa.audioContext.resume();
                }
            }
        }

        function focusGameCanvas() {
            var canvas = document.querySelector("#gameContainer canvas");
            if (!canvas) return;
            canvas.setAttribute("tabindex", "1");
            canvas.focus();
            canvas.click();
        }

        function clickOkButtons() {
            var buttons = document.getElementsByTagName("button");
            for (var i = 0; i < buttons.length; i++) {
                if (buttons[i].innerHTML === "OK") {
                    buttons[i].click();
                }
            }
        }

        function startGame() {
            if (gameStarted) return;
            gameStarted = true;

            document.getElementById("start-screen").style.display = "none";
            document.getElementById("loader").style.display = "flex";

            gameInstance = UnityLoader.instantiate("gameContainer", "Build/GeometryDashLite.json", {
                onProgress: UnityProgress,
                Module: {
                    postRun: [function() {
                        resumeUnityAudio();
                        focusGameCanvas();
                        clickOkButtons();
                        setTimeout(clickOkButtons, 500);
                        setTimeout(clickOkButtons, 1500);
                    }]
                }
            });

            audioKeepAlive = setInterval(resumeUnityAudio, 500);
        }

        function UnityProgress(inst, progress) {
            if (!inst.Module) return;
            var loader = document.querySelector("#loader");
            if (!inst.progress) {
                var progressEl = document.querySelector("#loader .progress");
                progressEl.style.display = "block";
                inst.progress = progressEl.querySelector(".full");
            }
            inst.progress.style.transform = "scaleX(" + progress + ")";
            if (progress === 1 && !inst.removeTimeout) {
                inst.removeTimeout = setTimeout(function() {
                    loader.style.display = "none";
                    resumeUnityAudio();
                    focusGameCanvas();
                    if (audioKeepAlive) clearInterval(audioKeepAlive);
                }, 2000);
            }
        }

        var startScreen = document.getElementById("start-screen");
        startScreen.addEventListener("click", startGame);
        startScreen.addEventListener("touchstart", function(e) {
            e.preventDefault();
            startGame();
        }, { passive: false });

        document.addEventListener("keydown", function(e) {
            if (!gameStarted && (e.code === "Space" || e.code === "Enter")) {
                e.preventDefault();
                startGame();
            }
            if (gameStarted) resumeUnityAudio();
        });

        document.addEventListener("pointerdown", function() {
            if (gameStarted) resumeUnityAudio();
        });
    </script>
</body>
</html>
