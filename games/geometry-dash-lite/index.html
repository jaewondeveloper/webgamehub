<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Geometry Dash Lite — WebGameHub</title>
    <style>
        html { box-sizing: border-box; }
        *, *:before, *:after { box-sizing: inherit; }
        body {
            margin: 0;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            overflow: hidden;
        }
        #back-hub {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 99999;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            text-decoration: none;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(8px);
        }
        #back-hub:hover { background: rgba(255, 255, 255, 0.15); }
        #gameContainer { width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; display: block; }
        #loader {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            z-index: 50;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }
        #loader img.logo {
            max-width: min(90vw, 500px);
            margin-bottom: 24px;
        }
        #loader .progress-wrap {
            width: min(90vw, 436px);
            height: 24px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        #loader .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ccff, #0066ff);
            transition: width 0.2s;
        }
        #load-status { font-size: 14px; opacity: 0.85; }
        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            cursor: pointer;
        }
        #start-screen img { max-width: min(90vw, 500px); margin-bottom: 32px; }
        #start-screen .play-btn {
            padding: 16px 48px;
            font-size: 22px;
            font-weight: 700;
            border: none;
            border-radius: 999px;
            background: linear-gradient(90deg, #00ccff, #0066ff);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.5);
        }
        #start-screen p { margin-top: 16px; opacity: 0.7; font-size: 14px; max-width: 320px; line-height: 1.5; }
        #error-msg {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.9);
            color: #fff;
            font-family: sans-serif;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        #error-msg button {
            margin-top: 20px;
            padding: 12px 28px;
            border: none;
            border-radius: 999px;
            background: #0066ff;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
    <script src="Build/UnityLoader.js"></script>
</head>
<body>
    <a id="back-hub" href="../../index.html">&larr; Hub</a>

    <div id="start-screen">
        <img src="image/loading.png" alt="Geometry Dash Lite">
        <button class="play-btn" type="button">▶ PLAY</button>
        <p>첫 실행 시 약 65MB 다운로드가 필요합니다.<br>와이파이 연결 후 PLAY를 눌러주세요.</p>
    </div>

    <div id="loader">
        <img class="logo" src="image/loading.png" alt="Loading">
        <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
        <div id="load-status">로딩 중... 0%</div>
    </div>

    <div id="error-msg">
        <h2>로딩 실패</h2>
        <p id="error-text">게임 파일을 불러오지 못했습니다.</p>
        <button onclick="location.reload()">다시 시도</button>
    </div>

    <div id="gameContainer"></div>

    <script>
        var gameInstance = null;
        var gameStarted = false;

        function showError(msg) {
            document.getElementById("loader").style.display = "none";
            document.getElementById("error-text").textContent = msg;
            document.getElementById("error-msg").style.display = "flex";
        }

        function unlockBrowserAudio() {
            var AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return;
            var ctx = new AC();
            if (ctx.state === "suspended") ctx.resume();
            var buf = ctx.createBuffer(1, 1, 22050);
            var src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);
            src.start(0);
        }

        function resumeUnityAudio() {
            if (typeof WEBAudio !== "undefined" && WEBAudio.audioContext) {
                WEBAudio.audioWebEnabled = 1;
                if (WEBAudio.audioContext.state === "suspended") {
                    WEBAudio.audioContext.resume();
                }
            }
        }

        function clickOkButtons() {
            var buttons = document.getElementsByTagName("button");
            for (var i = 0; i < buttons.length; i++) {
                if (buttons[i].innerHTML === "OK") buttons[i].click();
            }
        }

        function UnityProgress(inst, progress) {
            if (!inst.Module) return;
            var pct = Math.floor(progress * 100);
            document.getElementById("progress-bar").style.width = pct + "%";
            document.getElementById("load-status").textContent = "로딩 중... " + pct + "%";
            if (progress === 1 && !inst.removeTimeout) {
                inst.removeTimeout = setTimeout(function() {
                    document.getElementById("loader").style.display = "none";
                    resumeUnityAudio();
                    clickOkButtons();
                    var canvas = document.querySelector("#gameContainer canvas");
                    if (canvas) canvas.focus();
                }, 1500);
            }
        }

        function startGame() {
            if (gameStarted) return;
            gameStarted = true;

            unlockBrowserAudio();
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("loader").style.display = "flex";

            try {
                gameInstance = UnityLoader.instantiate("gameContainer", "Build/GeometryDashLite.json", {
                    onProgress: UnityProgress,
                    onerror: function(msg) { showError(msg); },
                    Module: {
                        onAbort: function(msg) { showError(String(msg)); },
                        postRun: [function() {
                            resumeUnityAudio();
                            clickOkButtons();
                            setTimeout(clickOkButtons, 800);
                        }]
                    }
                });
            } catch (e) {
                showError(e.message || "게임 시작 오류");
            }
        }

        document.getElementById("start-screen").addEventListener("click", startGame);
        document.getElementById("start-screen").addEventListener("touchstart", function(e) {
            e.preventDefault();
            startGame();
        }, { passive: false });

        document.addEventListener("pointerdown", resumeUnityAudio);
        document.addEventListener("keydown", function(e) {
            if (!gameStarted && (e.code === "Space" || e.code === "Enter")) {
                e.preventDefault();
                startGame();
            } else {
                resumeUnityAudio();
            }
        });
    </script>
</body>
</html>
