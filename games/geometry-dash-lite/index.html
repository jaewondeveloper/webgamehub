<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Geometry Dash Lite — WebGameHub</title>
    <style>
        html { box-sizing: border-box; }
        *, *:before, *:after { box-sizing: inherit; }
        body {
            margin: 0;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            overflow: hidden;
        }
        #back-hub {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 99999;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            text-decoration: none;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(8px);
        }
        #back-hub:hover { background: rgba(255, 255, 255, 0.15); }
        #gameContainer { width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; display: block; }
        canvas + * { z-index: 2; }
        .logo {
            position: absolute;
            display: block;
            max-width: 100vw;
            max-height: 70vh;
            top: 300px;
        }
        .pos_progress { position: absolute; bottom: 15%; width: 100%; }
        .progress {
            margin: 1.5em auto;
            max-width: 436px;
            height: auto;
            display: none;
            position: relative;
        }
        .full { width: 97%; transform-origin: top left; }
        .box_process { width: 100%; }
        .progress .posfull, .progress .posbox {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progress .posfull { top: 8px; z-index: 1; }
        .progress .posbox { top: 0; z-index: 2; }
        #loader {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
        }
        .spinner, .spinner:after {
            display: none;
            border-radius: 50%;
            width: 5em; height: 5em;
        }
        .spinner {
            margin: 10px;
            font-size: 10px;
            position: relative;
            text-indent: -9999em;
            border-top: 1.1em solid rgba(255, 255, 255, 0.2);
            border-right: 1.1em solid rgba(255, 255, 255, 0.2);
            border-bottom: 1.1em solid rgba(255, 255, 255, 0.2);
            border-left: 1.1em solid #ffffff;
            transform: translateZ(0);
            animation: spinner-spin 1.1s infinite linear;
        }
        @keyframes spinner-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <a id="back-hub" href="../../index.html">&larr; Hub</a>

    <div id="gameContainer"></div>
    <div id="loader">
        <img class="logo" src="image/loading.png" alt="Loading">
        <div class="spinner"></div>
        <div class="pos_progress">
            <div class="progress">
                <div class="posfull"><img class="full" src="image/process_bar_back.png" alt=""></div>
                <div class="posbox"><img class="box_process" src="image/process_bar_front.png" alt=""></div>
            </div>
        </div>
    </div>

    <script src="Build/UnityLoader.js"></script>
    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "Build/GeometryDashLite.json", {
            onProgress: UnityProgress
        });

        function UnityProgress(gameInstance, progress) {
            if (!gameInstance.Module) return;
            const loader = document.querySelector("#loader");
            if (!gameInstance.progress) {
                const progressEl = document.querySelector("#loader .progress");
                progressEl.style.display = "block";
                gameInstance.progress = progressEl.querySelector(".full");
                loader.querySelector(".spinner").style.display = "none";
            }
            gameInstance.progress.style.transform = "scaleX(" + progress + ")";
            if (progress === 1 && !gameInstance.removeTimeout) {
                gameInstance.removeTimeout = setTimeout(function() {
                    loader.style.display = "none";
                }, 2000);
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            function clickOkButtons() {
                var buttons = document.getElementsByTagName("button");
                for (var i = 0; i < buttons.length; i++) {
                    if (buttons[i].innerHTML === "OK") {
                        buttons[i].click();
                    }
                }
            }
            clickOkButtons();
            setTimeout(clickOkButtons, 1000);
        });
    </script>
</body>
</html>
