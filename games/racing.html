<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Infinite Racing — WebGameHub</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #back-hub {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 20;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(0, 255, 255, 0.35);
            color: #00ffcc;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }
        #back-hub:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 16px rgba(0, 255, 255, 0.3);
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            pointer-events: none;
        }
        #score-board {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,255,255,0.8);
            letter-spacing: 2px;
        }
        #speed-board {
            font-size: 14px;
            color: #00ffcc;
            margin-top: 5px;
        }
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #game-over-screen h1 {
            font-size: 48px;
            color: #ff3366;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,51,102,0.6);
        }
        #final-score {
            font-size: 24px;
            margin-bottom: 30px;
        }
        .btn {
            padding: 12px 30px;
            font-size: 18px;
            background: linear-gradient(45deg, #00ffff, #0066ff);
            border: none;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,255,255,0.4);
            transition: 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0,255,255,0.8);
        }
        #audio-hint {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            padding: 10px 20px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.4);
            color: #00ffcc;
            font-size: 13px;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <a id="back-hub" href="../index.html">&larr; Hub</a>

    <div id="ui">
        <div id="score-board">SCORE: <span id="score">0</span></div>
        <div id="speed-board"><span id="speed">120</span> KM/H</div>
    </div>

    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <div id="final-score">최종 점수: 0</div>
        <button class="btn" onclick="resetGame()">다시 도전하기</button>
    </div>

    <div id="canvas-container"></div>
    <div id="audio-hint">클릭 또는 키 입력으로 BGM 시작</div>

    <script>
        let scene, camera, renderer;
        let playerCar;
        let obstacles = [];
        let environmentObjects = [];
        let score = 0;
        let speed = 0.8;
        let targetSpeed = 0.8;
        let isGameOver = false;

        let audioCtx = null;
        let engineOsc = null;
        let engineGain = null;
        let bgmStarted = false;

        function startAudio() {
            if (bgmStarted) return;
            bgmStarted = true;
            document.getElementById('audio-hint').style.opacity = '0';

            const AC = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AC();

            engineGain = audioCtx.createGain();
            engineGain.gain.value = 0.08;
            engineOsc = audioCtx.createOscillator();
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.value = 80;
            const engineFilter = audioCtx.createBiquadFilter();
            engineFilter.type = 'lowpass';
            engineFilter.frequency.value = 400;
            engineOsc.connect(engineFilter);
            engineFilter.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();

            const master = audioCtx.createGain();
            master.gain.value = 0.18;
            master.connect(audioCtx.destination);

            const bass = audioCtx.createOscillator();
            bass.type = 'square';
            bass.frequency.value = 55;
            const bassGain = audioCtx.createGain();
            bassGain.gain.value = 0.3;
            bass.connect(bassGain);
            bassGain.connect(master);
            bass.start();

            const notes = [110, 130.81, 164.81, 196, 220, 261.63];
            let noteIdx = 0;
            function playArp() {
                if (isGameOver || !audioCtx) return;
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = notes[noteIdx % notes.length];
                g.gain.setValueAtTime(0.15, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                osc.connect(g);
                g.connect(master);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
                noteIdx++;
                setTimeout(playArp, 200);
            }
            playArp();

            const kick = () => {
                if (isGameOver || !audioCtx) return;
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.frequency.setValueAtTime(150, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.12);
                g.gain.setValueAtTime(0.4, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                o.connect(g);
                g.connect(master);
                o.start();
                o.stop(audioCtx.currentTime + 0.12);
                setTimeout(kick, 500);
            };
            kick();
        }

        function updateEngineSound() {
            if (!engineOsc || !audioCtx) return;
            const freq = 60 + speed * 120;
            engineOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
            engineGain.gain.setTargetAtTime(isGameOver ? 0 : 0.06 + speed * 0.04, audioCtx.currentTime, 0.1);
        }

        const ROAD_WIDTH = 12;
        const LANE_COUNT = 3;
        const LANES = [-4, 0, 4];
        let currentLane = 1;
        let targetX = LANES[currentLane];

        const keys = { Left: false, Right: false };

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a18);
            scene.fog = new THREE.FogExp2(0x0a0a18, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 8);
            camera.lookAt(0, 1, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1000;
            dirLight.shadow.mapSize.height = 1000;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 50;
            const d = 20;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            scene.add(dirLight);

            const neonLight = new THREE.PointLight(0x00ffff, 1, 30);
            neonLight.position.set(0, 5, -10);
            scene.add(neonLight);

            createRoad();
            createEnvironment();
            createPlayerCar();

            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('touchstart', handleTouch);
            window.addEventListener('click', startAudio);

            animate();
        }

        function createRoad() {
            const roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, 1000);
            const roadMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a24,
                roughness: 0.8
            });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.z = -400;
            road.receiveShadow = true;
            scene.add(road);

            const edgeGeo = new THREE.BoxGeometry(0.2, 0.1, 1000);
            const edgeMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.5 });

            const leftEdge = new THREE.Mesh(edgeGeo, edgeMat);
            leftEdge.position.set(-ROAD_WIDTH/2, 0.05, -400);
            scene.add(leftEdge);

            const rightEdge = leftEdge.clone();
            rightEdge.position.x = ROAD_WIDTH/2;
            scene.add(rightEdge);
        }

        function createPlayerCar() {
            playerCar = new THREE.Group();

            const bodyGeo = new THREE.BoxGeometry(1.6, 0.5, 3.2);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff3366, roughness: 0.2, metalness: 0.8 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.4;
            body.castShadow = true;
            playerCar.add(body);

            const cabinGeo = new THREE.BoxGeometry(1.2, 0.4, 1.4);
            const cabinMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, transparent: true, opacity: 0.7 });
            const cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 0.75, -0.2);
            playerCar.add(cabin);

            const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.4, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });

            const wheelPositions = [
                [-0.9, 0.35, -1], [0.9, 0.35, -1],
                [-0.9, 0.35, 1], [0.9, 0.35, 1]
            ];

            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.castShadow = true;
                playerCar.add(wheel);
            });

            const lightGeo = new THREE.BoxGeometry(0.4, 0.1, 0.1);
            const lightMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 2 });
            const leftTail = new THREE.Mesh(lightGeo, lightMat);
            leftTail.position.set(-0.5, 0.5, 1.6);
            const rightTail = leftTail.clone();
            rightTail.position.x = 0.5;
            playerCar.add(leftTail, rightTail);

            playerCar.position.set(LANES[currentLane], 0, 0);
            scene.add(playerCar);
        }

        function createEnvironment() {
            for (let i = 0; i < 30; i++) {
                spawnBuilding(-20 - Math.random() * 30, -i * 30);
                spawnBuilding(20 + Math.random() * 30, -i * 30);
            }
        }

        function spawnBuilding(x, z) {
            const h = 10 + Math.random() * 40;
            const w = 5 + Math.random() * 10;
            const geo = new THREE.BoxGeometry(w, h, w);

            const randColor = ['#111122', '#16162d', '#090915'][Math.floor(Math.random() * 3)];
            const mat = new THREE.MeshStandardMaterial({
                color: randColor,
                roughness: 0.5
            });

            const building = new THREE.Mesh(geo, mat);
            building.position.set(x, h/2, z);
            scene.add(building);
            environmentObjects.push(building);
        }

        function spawnObstacle() {
            if (isGameOver) return;

            const obstacleGroup = new THREE.Group();
            const lane = Math.floor(Math.random() * LANE_COUNT);

            const bodyGeo = new THREE.BoxGeometry(1.6, 0.6, 3);
            const colors = [0x00ffcc, 'orange', 0x9933ff];
            const randColor = colors[Math.floor(Math.random() * colors.length)];

            const bodyMat = new THREE.MeshStandardMaterial({ color: randColor, roughness: 0.4 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.4;
            body.castShadow = true;
            obstacleGroup.add(body);

            const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.4, 12);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const wPos = [[-0.9, 0.35, -0.9], [0.9, 0.35, -0.9], [-0.9, 0.35, 0.9], [0.9, 0.35, 0.9]];
            wPos.forEach(pos => {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.z = Math.PI/2;
                w.position.set(pos[0], pos[1], pos[2]);
                obstacleGroup.add(w);
            });

            obstacleGroup.position.set(LANES[lane], 0, -100 - Math.random() * 40);
            scene.add(obstacleGroup);
            obstacles.push(obstacleGroup);
        }

        function handleKeyDown(e) {
            startAudio();
            if (isGameOver) return;
            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && currentLane > 0) {
                currentLane--;
                targetX = LANES[currentLane];
            }
            if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && currentLane < LANE_COUNT - 1) {
                currentLane++;
                targetX = LANES[currentLane];
            }
        }

        function handleKeyUp(e) {}

        function handleTouch(e) {
            startAudio();
            if (isGameOver) return;
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2 && currentLane > 0) {
                currentLane--;
            } else if (touchX >= window.innerWidth / 2 && currentLane < LANE_COUNT - 1) {
                currentLane++;
            }
            targetX = LANES[currentLane];
        }

        let obstacleTimer = 0;

        function animate() {
            requestAnimationFrame(animate);

            if (!isGameOver) {
                score += 1;
                document.getElementById('score').innerText = Math.floor(score / 5);

                targetSpeed = 0.8 + (score * 0.0001);
                speed = THREE.MathUtils.lerp(speed, targetSpeed, 0.1);
                document.getElementById('speed').innerText = Math.floor(speed * 180);
                updateEngineSound();

                playerCar.position.x = THREE.MathUtils.lerp(playerCar.position.x, targetX, 0.15);
                playerCar.rotation.y = (targetX - playerCar.position.x) * 0.1;
                playerCar.rotation.z = (targetX - playerCar.position.x) * 0.05;

                obstacleTimer += 1;
                if (obstacleTimer > Math.max(20, 50 - (score * 0.001))) {
                    spawnObstacle();
                    obstacleTimer = 0;
                }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.position.z += speed;

                    const playerBox = new THREE.Box3().setFromObject(playerCar);
                    const obsBox = new THREE.Box3().setFromObject(obs);
                    playerBox.expandByScalar(-0.1);

                    if (playerBox.intersectsBox(obsBox)) {
                        endGame();
                    }

                    if (obs.position.z > 15) {
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                    }
                }

                environmentObjects.forEach(obj => {
                    obj.position.z += speed;
                    if (obj.position.z > 20) {
                        obj.position.z = -800 - Math.random() * 100;
                    }
                });
            }

            renderer.render(scene, camera);
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = `최종 점수: ${Math.floor(score / 5)}`;
        }

        function resetGame() {
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];

            score = 0;
            speed = 0.8;
            targetSpeed = 0.8;
            currentLane = 1;
            targetX = LANES[currentLane];
            playerCar.position.set(targetX, 0, 0);
            playerCar.rotation.set(0, 0, 0);

            document.getElementById('game-over-screen').style.display = 'none';
            isGameOver = false;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
